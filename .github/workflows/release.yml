name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Get version
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: Get checksums
        id: sums
        run: |
          curl -sL "https://github.com/sm010422/lazyredis/releases/download/v${{ steps.version.outputs.VERSION }}/checksums.txt" > checksums.txt
          echo "darwin_arm64=$(awk '/darwin_arm64/{print $1}' checksums.txt)" >> "$GITHUB_OUTPUT"
          echo "darwin_amd64=$(awk '/darwin_amd64/{print $1}' checksums.txt)" >> "$GITHUB_OUTPUT"
          echo "linux_arm64=$(awk '/linux_arm64/{print $1}'  checksums.txt)"  >> "$GITHUB_OUTPUT"
          echo "linux_amd64=$(awk '/linux_amd64/{print $1}'  checksums.txt)"  >> "$GITHUB_OUTPUT"

      - name: Update Homebrew formula
        env:
          TAP_TOKEN: ${{ secrets.TAP_GITHUB_TOKEN }}
          VERSION: ${{ steps.version.outputs.VERSION }}
          SHA_DARWIN_ARM64: ${{ steps.sums.outputs.darwin_arm64 }}
          SHA_DARWIN_AMD64: ${{ steps.sums.outputs.darwin_amd64 }}
          SHA_LINUX_ARM64:  ${{ steps.sums.outputs.linux_arm64 }}
          SHA_LINUX_AMD64:  ${{ steps.sums.outputs.linux_amd64 }}
        run: |
          python3 - <<'PYEOF'
          import os, base64, json, urllib.request

          version = os.environ["VERSION"]
          token   = os.environ["TAP_TOKEN"]
          sums = {
            "darwin_arm64": os.environ["SHA_DARWIN_ARM64"],
            "darwin_amd64": os.environ["SHA_DARWIN_AMD64"],
            "linux_arm64":  os.environ["SHA_LINUX_ARM64"],
            "linux_amd64":  os.environ["SHA_LINUX_AMD64"],
          }

          formula = f"""class Lazyredis < Formula
            desc "Lazygit-inspired terminal UI for Redis"
            homepage "https://github.com/sm010422/lazyredis"
            version "{version}"
            license "MIT"

            on_macos do
              if Hardware::CPU.arm?
                url "https://github.com/sm010422/lazyredis/releases/download/v{version}/lazyredis_darwin_arm64.tar.gz"
                sha256 "{sums['darwin_arm64']}"
              else
                url "https://github.com/sm010422/lazyredis/releases/download/v{version}/lazyredis_darwin_amd64.tar.gz"
                sha256 "{sums['darwin_amd64']}"
              end
            end

            on_linux do
              if Hardware::CPU.arm?
                url "https://github.com/sm010422/lazyredis/releases/download/v{version}/lazyredis_linux_arm64.tar.gz"
                sha256 "{sums['linux_arm64']}"
              else
                url "https://github.com/sm010422/lazyredis/releases/download/v{version}/lazyredis_linux_amd64.tar.gz"
                sha256 "{sums['linux_amd64']}"
              end
            end

            def install
              bin.install "lazyredis"
            end

            test do
              assert_predicate bin/"lazyredis", :exist?
            end
          end
          """

          api = "https://api.github.com/repos/sm010422/homebrew-lazyredis/contents/Formula/lazyredis.rb"
          headers = {
            "Authorization": f"token {token}",
            "Accept": "application/vnd.github+json",
            "X-GitHub-Api-Version": "2022-11-28",
          }

          req = urllib.request.Request(api, headers=headers)
          with urllib.request.urlopen(req) as r:
              file_sha = json.loads(r.read())["sha"]

          body = json.dumps({
            "message": f"chore: update formula to v{version}",
            "content": base64.b64encode(formula.encode()).decode(),
            "sha": file_sha,
          }).encode()

          req = urllib.request.Request(api, data=body, headers=headers, method="PUT")
          with urllib.request.urlopen(req) as r:
              commit_sha = json.loads(r.read())["commit"]["sha"]
          print(f"Formula updated → {commit_sha}")
          PYEOF
